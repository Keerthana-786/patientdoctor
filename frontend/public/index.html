<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuantumShield Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #040810; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,196,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,196,0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }
    #root { position: relative; z-index: 1; }
    :root {
      --bg: #040810; --surface: #0a0f1a; --card: #0f1520;
      --border: #1a2540; --border2: #243050;
      --accent: #00f5c4; --accent-dim: rgba(0,245,196,0.1);
      --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.1);
      --blue: #38bdf8; --blue-dim: rgba(56,189,248,0.1);
      --danger: #f43f5e; --danger-dim: rgba(244,63,94,0.1);
      --warn: #fb923c; --warn-dim: rgba(251,146,60,0.1);
      --text: #e2e8f0; --muted: #4a5880; --muted2: #7a90bb;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
